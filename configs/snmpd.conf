
# järjestelmän kuvaus
sysLocation Sitting on the Dock of the Bay
sysContact Me me@example.org
# määrittelee aloittavan sysServices.0 objektin
sysServices 72
# agentx tuki päälle
master agentx
# verkkokortin bind
agentAddress udp:161
#luodaan Alluser käyttäjä, jolla community testw900t ja ConfigUser, jolla community testt009t
com2sec AllUser default NetManage
com2sec ConfigUser default testt009t
# liitetään käyttäjä ryhmään AllGroup ja sallitaan ainoastaan v2c
group AllGroup v2c AllUser
# liitetään käyttäjä ryhmään ConfigGroup ja sallitaan ainoastaan v2c
group ConfigGroup v2c ConfigUser
# määritellään systemview ja sallitaan kaikki .1.3.6.1.2.1.1 ja 1.3.6.1.2.1.25.1.1 oidien alta sekä määritellään Allview joka sallii kaiken .1 alta
view SystemView included .1.3.6.1.2.1.1
view SystemView included .1.3.6.1.2.1.25.1.1
view AllView included .1
view LinuxView included 1.3.6.1.4.1.2021

# määritellään ConfigGroup jolla lukuoikeus järjestelmänäkymiin sekä AllGroup jolla pääsy kaikkialle
access ConfigGroup "" any noauth exact SystemView none none
access AllGroup "" any noauth exact AllView none none
# sallitaan levyjen lukeminen
includeAllDisks 10%

#luodaan käyttäjä
createUser monitoring_user SHA "password123" AES "password123"
rouser monitoring_user priv
